name: DataBite CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  
      - name: build docker image
        run: docker build -t databite:latest .

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push docker image
        run: |
          docker build -t yuvalfarkash/databite:latest .
          docker push yuvalfarkash/databite:latest
    deploy:
      runs on: ubuntu-latest
      needs: build-and-test
      steps:
        - name: create ssh  commands to deploy
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ubuntu
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              docker stop databite || true
              docker rm databite || true
              docker pull yuvalfarkash/databite:latest
              docker run -d --name databite -p 80:80 yuvalfarkash/databite:latest